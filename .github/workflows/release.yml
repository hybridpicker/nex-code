name: Release
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - run: npm ci

      - run: npm run build

      - name: Get current version
        id: current_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if version exists on npm
        id: version_check
        env:
          VERSION: ${{ steps.current_version.outputs.VERSION }}
        run: |
          if npm view nex-code@$VERSION >/dev/null 2>&1; then
            echo "VERSION_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "VERSION_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify npm authentication
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: steps.version_check.outputs.VERSION_EXISTS == 'false'
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate release notes
        if: always() && steps.version_check.outputs.VERSION_EXISTS == 'false'
        id: release_notes
        env:
          VERSION: ${{ steps.current_version.outputs.VERSION }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: always() && steps.version_check.outputs.VERSION_EXISTS == 'false'
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.current_version.outputs.VERSION }}
          name: Release v${{ steps.current_version.outputs.VERSION }}
          body: |
            ## Changes in v${{ steps.current_version.outputs.VERSION }}

            ${{ steps.release_notes.outputs.NOTES }}
          draft: false
          prerelease: false

      - name: Notify on publish failure
        if: failure()
        run: |
          echo "::error::npm publish failed for version ${{ steps.current_version.outputs.VERSION }}"
          echo "Check NPM_TOKEN secret validity: npm token list"

  publish-vscode:
    name: Build and attach VS Code Extension
    runs-on: ubuntu-latest
    needs: release
    timeout-minutes: 15
    if: needs.release.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root deps
        run: npm ci

      - name: Install VS Code extension deps
        run: cd vscode && npm ci

      - name: Build VS Code extension
        run: cd vscode && npm run build

      - name: Package VS Code extension (.vsix)
        run: cd vscode && npx @vscode/vsce package --no-dependencies --allow-missing-repository

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Attach .vsix to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: vscode/*.vsix

      - name: Publish to VS Code Marketplace
        if: ${{ secrets.VSCE_PAT != '' }}
        run: cd vscode && npx @vscode/vsce publish --no-dependencies --allow-missing-repository --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
