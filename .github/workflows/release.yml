name: Release
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Get current version
        id: current_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if version exists on npm
        id: version_check
        env:
          VERSION: ${{ steps.current_version.outputs.VERSION }}
        run: |
          if npm view nex-code@$VERSION >/dev/null 2>&1; then
            echo "VERSION_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "VERSION_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify npm authentication
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: steps.version_check.outputs.VERSION_EXISTS == 'false'
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate release notes
        if: always() && steps.version_check.outputs.VERSION_EXISTS == 'false'
        id: release_notes
        env:
          VERSION: ${{ steps.current_version.outputs.VERSION }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: always() && steps.version_check.outputs.VERSION_EXISTS == 'false'
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.current_version.outputs.VERSION }}
          name: Release v${{ steps.current_version.outputs.VERSION }}
          body: |
            ## Changes in v${{ steps.current_version.outputs.VERSION }}

            ${{ steps.release_notes.outputs.NOTES }}
          draft: false
          prerelease: false

      - name: Notify on publish failure
        if: failure()
        run: |
          echo "::error::npm publish failed for version ${{ steps.current_version.outputs.VERSION }}"
          echo "Check NPM_TOKEN secret validity: npm token list"