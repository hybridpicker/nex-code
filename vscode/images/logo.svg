<svg xmlns="http://www.w3.org/2000/svg" viewBox="-3 -3 30 30" width="24" height="24">
  <!--
    Pixel-art dog face from nex-code ASCII banner:
      ██▄▄██   row 0: ears (col 0-1, col 4-5 filled; col 2-3 only bottom half)
      █▀██▀█   row 1: face (col 1,4 only top half → eye gaps at row 3)
      ▀████▀   row 2: muzzle (col 0,5 only top half → rounded chin)

    Grid (6×6, each cell = 4×4 px):
      Row 0: 1 1 0 0 1 1  ← ear tops
      Row 1: 1 1 1 1 1 1  ← forehead
      Row 2: 1 1 1 1 1 1  ← brow
      Row 3: 1 0 1 1 0 1  ← eyes (empty = pupils)
      Row 4: 1 1 1 1 1 1  ← muzzle
      Row 5: 0 1 1 1 1 0  ← chin (rounded corners)
  -->
  <!-- ears -->
  <rect x="0"  y="0"  width="8"  height="4" fill="currentColor"/>
  <rect x="16" y="0"  width="8"  height="4" fill="currentColor"/>
  <!-- forehead -->
  <rect x="0"  y="4"  width="24" height="4" fill="currentColor"/>
  <!-- brow -->
  <rect x="0"  y="8"  width="24" height="4" fill="currentColor"/>
  <!-- cheeks + nose bridge (eyes are the gaps at x=4 and x=16) -->
  <rect x="0"  y="12" width="4"  height="4" fill="currentColor"/>
  <rect x="8"  y="12" width="8"  height="4" fill="currentColor"/>
  <rect x="20" y="12" width="4"  height="4" fill="currentColor"/>
  <!-- muzzle -->
  <rect x="0"  y="16" width="24" height="4" fill="currentColor"/>
  <!-- chin (rounded) -->
  <rect x="4"  y="20" width="16" height="4" fill="currentColor"/>
</svg>
